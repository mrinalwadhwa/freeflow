name: Voice
options:
  bundleIdPrefix: computer.autonomy
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
  configs:
    Release:
      ENABLE_HARDENED_RUNTIME: true
      CODE_SIGN_IDENTITY: "Developer ID Application"
      DEVELOPMENT_TEAM: "3A56YKKGA5"
      CODE_SIGN_STYLE: Manual
      OTHER_CODE_SIGN_FLAGS: "--timestamp"

packages:
  VoiceKit:
    path: VoiceKit
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0

targets:
  VoiceApp:
    type: application
    platform: macOS
    sources:
      - path: VoiceApp/Sources
    settings:
      base:
        PRODUCT_NAME: Voice
        PRODUCT_BUNDLE_IDENTIFIER: computer.autonomy.voice
        INFOPLIST_FILE: VoiceApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: VoiceApp/Voice.entitlements
        ENABLE_APP_SANDBOX: false
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
    dependencies:
      - package: VoiceKit
      - package: Sparkle
    entitlements:
      path: VoiceApp/Voice.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
