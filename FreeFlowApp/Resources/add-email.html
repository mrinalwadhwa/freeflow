<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Add your email – FreeFlow</title>
        <style>
            /* --- Base styles (from styles.css) --- */

            :root {
                --color-bg: #eeeceb;
                --color-surface: #f9f9f9;
                --color-text: #292929;
                --color-muted: #7a7775;
                --color-light: #a8a4a1;
                --color-border: #ddd9d6;
                --color-border-light: #e8e5e3;
                --color-accent: #292929;
                --color-accent-hover: #3d3d3d;
                --color-white: #ffffff;
                --color-green: #3a8a5c;
                --color-green-bg: #e9f3ed;
                --color-yellow: #9e7c1a;
                --color-yellow-bg: #f8f2e0;
                --color-red: #b8383d;
                --color-red-bg: #f8e8e9;
                --color-blue: #3a6fa8;
                --color-blue-bg: #e5eef6;

                --baseline: 1.5rem;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                font-size: 16px;
                -webkit-text-size-adjust: 100%;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif,
                    "Apple Color Emoji", "Segoe UI Emoji";
                font-size: 1rem;
                line-height: 1.5;
                color: var(--color-text);
                background: var(--color-bg);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 0.5rem;
                padding: 0.5rem 1.25rem;
                font-size: 0.875rem;
                font-weight: 500;
                line-height: 1.714286;
                border: 1px solid transparent;
                border-radius: 9999px;
                cursor: pointer;
                transition:
                    background 0.15s,
                    border-color 0.15s,
                    color 0.15s,
                    box-shadow 0.15s;
                text-decoration: none;
                white-space: nowrap;
                letter-spacing: -0.005em;
            }

            .btn:hover {
                text-decoration: none;
            }

            .btn-primary {
                background: var(--color-accent);
                color: var(--color-white);
                border-color: var(--color-accent);
            }

            .btn-primary:hover {
                background: var(--color-accent-hover);
                border-color: var(--color-accent-hover);
                color: var(--color-white);
            }

            .btn-secondary {
                background: var(--color-white);
                color: var(--color-text);
                border-color: var(--color-border);
            }

            .btn-secondary:hover {
                background: var(--color-surface);
                border-color: var(--color-light);
            }

            .btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .hidden {
                display: none !important;
            }

            .form-input {
                width: 100%;
                padding: 0.5rem 0.875rem;
                font-size: 1rem;
                line-height: 1.5;
                color: var(--color-text);
                background: var(--color-white);
                border: 1px solid var(--color-border);
                border-radius: 8px;
                outline: none;
                font-family: inherit;
                transition:
                    border-color 0.15s,
                    box-shadow 0.15s;
            }

            .form-input:focus {
                border-color: var(--color-text);
                box-shadow: 0 0 0 3px rgba(41, 41, 41, 0.08);
            }

            /* --- Page-specific styles (from add-email template) --- */

            body {
                background: var(--color-bg);
                overflow: hidden;
            }

            .account-flow {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                max-width: 400px;
                margin: 0 auto;
                padding: 1.5rem;
                text-align: center;
            }

            .flow-step {
                width: 100%;
                transition:
                    opacity 0.2s ease,
                    transform 0.2s ease;
            }

            .flow-step.flow-hidden {
                display: none !important;
            }

            .flow-step.flow-active {
                opacity: 1;
                transform: translateY(0);
            }

            .flow-step.flow-exit {
                opacity: 0;
                transform: translateY(-12px);
                pointer-events: none;
            }

            .step-icon {
                width: 3rem; /* 2 baseline units */
                height: 3rem;
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.375rem;
                margin: 0 auto 1.5rem;
                flex-shrink: 0;
            }

            .step-icon-warm {
                background: var(--color-surface);
                color: var(--color-text);
                border: 1px solid var(--color-border-light);
            }

            .step-icon-green {
                background: var(--color-green-bg);
                color: var(--color-green);
            }

            .flow-step h1 {
                font-size: 1.625rem;
                font-weight: 700;
                line-height: 1.384615; /* ~2.25rem; 2 lines = 4.5rem = 3 units */
                margin-bottom: 0.461538em; /* 0.75rem = 0.5 unit */
                letter-spacing: -0.025em;
            }

            .flow-step p {
                font-size: 0.9375rem;
                color: var(--color-muted);
                max-width: 340px;
                margin: 0 auto 1.5rem;
                line-height: 1.6; /* 0.9375 * 1.6 = 1.5rem = 1 unit */
            }

            /* Variant-specific messaging */
            .variant-voluntary .flow-step p.variant-msg::after {
                content: "";
            }

            .variant-grace .grace-badge {
                display: inline-flex;
                align-items: center;
                gap: 0.375rem;
                padding: 0 0.75rem;
                background: var(--color-yellow-bg);
                color: var(--color-yellow);
                border-radius: 9999px;
                font-size: 0.8125rem;
                font-weight: 500;
                line-height: 1.5rem; /* 1 baseline unit height */
                margin-bottom: 0.75rem;
            }

            .variant-enforced .enforced-badge {
                display: inline-flex;
                align-items: center;
                gap: 0.375rem;
                padding: 0 0.75rem;
                background: var(--color-red-bg);
                color: var(--color-red);
                border-radius: 9999px;
                font-size: 0.8125rem;
                font-weight: 500;
                line-height: 1.5rem;
                margin-bottom: 0.75rem;
            }

            .grace-badge,
            .enforced-badge {
                display: none;
            }

            .variant-grace .grace-badge,
            .variant-enforced .enforced-badge {
                display: inline-flex;
            }

            /* Form elements */
            .email-form {
                width: 100%;
                text-align: left;
            }

            .email-form .form-group {
                margin-bottom: 0.75rem;
            }

            .email-form .form-input {
                text-align: center;
                font-size: 1rem;
                line-height: 1.5;
                border-radius: 10px;
                border-color: var(--color-border);
                background: var(--color-surface);
            }

            .email-form .form-input:focus {
                border-color: var(--color-text);
                background: var(--color-white);
                box-shadow: 0 0 0 3px rgba(41, 41, 41, 0.08);
            }

            .otp-input-row {
                display: flex;
                gap: 0.5rem;
                justify-content: center;
                margin-bottom: 1.5rem;
            }

            .otp-input-row input {
                width: 2.75rem;
                height: 3rem; /* 2 baseline units */
                text-align: center;
                font-size: 1.375rem;
                font-weight: 600;
                border: 1px solid var(--color-border);
                border-radius: 10px;
                background: var(--color-surface);
                color: var(--color-text);
                transition:
                    border-color 0.15s,
                    background 0.15s,
                    box-shadow 0.15s;
                padding: 0;
            }

            .otp-input-row input:focus {
                outline: none;
                border-color: var(--color-text);
                background: var(--color-white);
                box-shadow: 0 0 0 3px rgba(41, 41, 41, 0.08);
            }

            .otp-input-row input.otp-error {
                border-color: var(--color-red);
                background: var(--color-red-bg);
            }

            .btn-row {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                align-items: center;
                width: 100%;
            }

            .btn-row .btn {
                width: 100%;
                max-width: 280px;
            }

            .btn-link {
                background: none;
                border: none;
                color: var(--color-light);
                font-size: 0.8125rem;
                cursor: pointer;
                padding: 0.375rem 0.5rem;
                line-height: 1.5rem;
                text-decoration: underline;
                text-decoration-color: var(--color-border);
                text-underline-offset: 0.15em;
                transition:
                    color 0.15s,
                    text-decoration-color 0.15s;
            }

            .btn-link:hover {
                color: var(--color-text);
                text-decoration-color: var(--color-text);
            }

            .resend-row {
                margin-top: 0.75rem;
                font-size: 0.8125rem;
                line-height: 1.5rem;
                color: var(--color-muted);
            }

            .resend-row a {
                color: var(--color-text);
                cursor: pointer;
                text-decoration: underline;
                text-decoration-color: var(--color-border);
                text-underline-offset: 0.15em;
            }

            .resend-row a:hover {
                text-decoration-color: var(--color-text);
            }

            .resend-row a.disabled {
                color: var(--color-light);
                pointer-events: none;
                text-decoration: none;
            }

            .error-message {
                color: var(--color-red);
                font-size: 0.8125rem;
                line-height: 1.5rem;
                min-height: 1.5rem; /* 1 baseline unit */
                margin-bottom: 0.75rem;
            }

            .email-display {
                font-weight: 500;
                color: var(--color-text);
            }

            /* Success checkmark */
            .success-checkmark {
                width: 3rem; /* 2 baseline units */
                height: 3rem;
                border-radius: 50%;
                background: var(--color-green);
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0 auto 1.5rem;
                animation: check-pop 0.3s ease;
            }

            .success-checkmark svg {
                width: 1.25rem;
                height: 1.25rem;
                stroke: var(--color-white);
                stroke-width: 3;
                fill: none;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            @keyframes check-pop {
                0% {
                    transform: scale(0.5);
                    opacity: 0;
                }
                70% {
                    transform: scale(1.1);
                }
                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>
        <div class="account-flow" id="account-flow">
            <!-- ====================================================== -->
            <!-- Step 1: Enter email                                     -->
            <!-- ====================================================== -->
            <div class="flow-step flow-active" data-flow-step="email">
                <div class="step-icon step-icon-warm">&#9993;</div>

                <div class="grace-badge">&#9888; Action needed</div>
                <div class="enforced-badge">&#9888; Required to continue</div>

                <h1>Add your email</h1>
                <p id="email-description">Add your email to enable session recovery and sign in from any device.</p>

                <div class="email-form">
                    <div class="form-group">
                        <input
                            class="form-input"
                            type="email"
                            id="email-input"
                            placeholder="you@example.com"
                            autocomplete="email"
                            autocapitalize="none"
                            spellcheck="false"
                        />
                    </div>
                    <div class="error-message" id="email-error"></div>
                    <div class="btn-row">
                        <button id="email-submit" class="btn btn-primary" disabled>Send verification code</button>
                        <button id="email-later" class="btn-link">Later</button>
                    </div>
                </div>
            </div>

            <!-- ====================================================== -->
            <!-- Step 2: Enter OTP                                       -->
            <!-- ====================================================== -->
            <div class="flow-step flow-hidden" data-flow-step="otp">
                <div class="step-icon step-icon-warm">&#128274;</div>
                <h1>Check your email</h1>
                <p>We sent a 6-digit code to <span class="email-display" id="otp-email-display"></span></p>

                <div class="otp-input-row" id="otp-inputs">
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" />
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                    <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" />
                </div>

                <div class="error-message" id="otp-error"></div>

                <div class="btn-row">
                    <button id="otp-verify" class="btn btn-primary" disabled>Verify</button>
                </div>

                <div class="resend-row">Didn't get the code? <a id="otp-resend" href="#">Resend</a></div>
            </div>

            <!-- ====================================================== -->
            <!-- Step 3: Success                                         -->
            <!-- ====================================================== -->
            <div class="flow-step flow-hidden" data-flow-step="success">
                <div class="success-checkmark">
                    <svg viewBox="0 0 24 24"><polyline points="5 13 10 18 19 6"></polyline></svg>
                </div>
                <h1>Email verified</h1>
                <p>You can now sign in with your email on any device.</p>

                <div class="btn-row">
                    <button id="success-done" class="btn btn-primary">Done</button>
                </div>
            </div>
        </div>

        <script>
            /**
             * Bridge between web pages and the native macOS app (WKWebView).
             *
             * When running inside the app's WKWebView, messages are sent via
             * window.webkit.messageHandlers.freeflow.postMessage(). The native side
             * pushes events back by calling window.freeflowbridge.onEvent(data).
             *
             * When running in a normal browser (for development/testing), send()
             * is a no-op that logs to the console, and onEvent can be called
             * manually from the browser console to simulate native responses.
             */
            (function () {
              "use strict";

              var inWebView = !!(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.freeflow);

              /**
               * Send an action to the native side.
               *
               * @param {string} action - The action name (e.g. "redeemInvite").
               * @param {Object} [data] - Optional payload data.
               */
              function send(action, data) {
                var message = { action: action };
                if (data !== undefined && data !== null) {
                  message.data = data;
                }

                if (inWebView) {
                  window.webkit.messageHandlers.freeflow.postMessage(message);
                } else {
                  console.log("[bridge] send:", JSON.stringify(message));
                }
              }

              /**
               * Whether we are running inside a WKWebView with the native bridge.
               *
               * @returns {boolean}
               */
              function isNative() {
                return inWebView;
              }

              // Event listeners registered via bridge.on().
              var listeners = {};

              /**
               * Register a listener for a specific event type.
               *
               * @param {string} eventName - The event name (e.g. "inviteRedeemed").
               * @param {Function} callback - Called with the event data object.
               */
              function on(eventName, callback) {
                if (!listeners[eventName]) {
                  listeners[eventName] = [];
                }
                listeners[eventName].push(callback);
              }

              /**
               * Remove a previously registered listener.
               *
               * @param {string} eventName - The event name.
               * @param {Function} callback - The exact function reference to remove.
               */
              function off(eventName, callback) {
                if (!listeners[eventName]) return;
                listeners[eventName] = listeners[eventName].filter(function (fn) {
                  return fn !== callback;
                });
              }

              /**
               * Remove all listeners for an event, or all listeners entirely.
               *
               * @param {string} [eventName] - If omitted, clears all listeners.
               */
              function clear(eventName) {
                if (eventName) {
                  delete listeners[eventName];
                } else {
                  listeners = {};
                }
              }

              /**
               * Called by the native side to deliver an event.
               * Also callable from the browser console for testing:
               *   window.freeflowbridge.onEvent({ event: "inviteRedeemed", user: { name: "Alice" } })
               *
               * @param {Object} data - Event payload. Must include an "event" field.
               */
              function onEvent(data) {
                if (!data || !data.event) {
                  console.warn("[bridge] onEvent called without event field:", data);
                  return;
                }

                if (!inWebView) {
                  console.log("[bridge] onEvent:", JSON.stringify(data));
                }

                var eventName = data.event;
                var cbs = listeners[eventName];
                if (cbs && cbs.length > 0) {
                  for (var i = 0; i < cbs.length; i++) {
                    try {
                      cbs[i](data);
                    } catch (err) {
                      console.error("[bridge] Error in listener for " + eventName + ":", err);
                    }
                  }
                }
              }

              // Public API exposed as window.freeflowbridge.
              window.freeflowbridge = {
                send: send,
                on: on,
                off: off,
                clear: clear,
                onEvent: onEvent,
                isNative: isNative,
              };
            })();
        </script>
        <script>
            (function () {
                "use strict";

                var bridge = window.freeflowbridge;

                // --------------------------------------------------------
                // Query params determine the variant
                // --------------------------------------------------------

                var params = new URLSearchParams(window.location.search);
                var variant = params.get("variant") || "voluntary";
                // variant: "voluntary" | "grace" | "enforced"

                var flowEl = document.getElementById("account-flow");
                flowEl.classList.add("variant-" + variant);

                // Customize description text based on variant.
                var descEl = document.getElementById("email-description");
                var laterBtn = document.getElementById("email-later");

                if (variant === "enforced") {
                    descEl.textContent =
                        "Your admin requires an email address to continue using " +
                        "FreeFlow. Add your email now.";
                    // No "Later" button in enforced mode.
                    laterBtn.style.display = "none";
                } else if (variant === "grace") {
                    descEl.textContent =
                        "Your admin would like you to add an email address. " +
                        "This enables session recovery and lets you sign in from any device.";
                    laterBtn.textContent = "Remind me later";
                } else {
                    descEl.textContent = "Add your email to enable session recovery and sign in from any device.";
                    laterBtn.textContent = "Later";
                }

                // --------------------------------------------------------
                // State
                // --------------------------------------------------------

                var currentEmail = "";
                var currentStep = "email";
                var transitioning = false;
                var resendCooldown = false;
                var pendingAction = "submit";

                // --------------------------------------------------------
                // Step navigation
                // --------------------------------------------------------

                function showStep(name) {
                    if (transitioning) return;
                    if (name === currentStep) return;
                    transitioning = true;

                    var prev = document.querySelector('[data-flow-step="' + currentStep + '"]');
                    var next = document.querySelector('[data-flow-step="' + name + '"]');

                    if (prev) {
                        prev.classList.remove("flow-active");
                        prev.classList.add("flow-exit");
                    }

                    setTimeout(function () {
                        if (prev) {
                            prev.classList.remove("flow-exit");
                            prev.classList.add("flow-hidden");
                        }
                        if (next) {
                            next.classList.remove("flow-hidden", "flow-exit");
                            next.classList.add("flow-active");
                        }
                        currentStep = name;
                        transitioning = false;
                    }, 200);
                }

                // --------------------------------------------------------
                // Email step
                // --------------------------------------------------------

                var emailInput = document.getElementById("email-input");
                var emailSubmit = document.getElementById("email-submit");
                var emailError = document.getElementById("email-error");

                function isValidEmail(str) {
                    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(str);
                }

                emailInput.addEventListener("input", function () {
                    emailError.textContent = "";
                    emailSubmit.disabled = !isValidEmail(emailInput.value.trim());
                });

                emailInput.addEventListener("keydown", function (e) {
                    if (e.key === "Enter" && !emailSubmit.disabled) {
                        e.preventDefault();
                        submitEmail();
                    }
                });

                emailSubmit.addEventListener("click", function (e) {
                    e.preventDefault();
                    submitEmail();
                });

                laterBtn.addEventListener("click", function (e) {
                    e.preventDefault();
                    bridge.send("dismiss");
                });

                function submitEmail() {
                    var email = emailInput.value.trim();
                    if (!isValidEmail(email)) return;

                    currentEmail = email;
                    emailError.textContent = "";
                    emailSubmit.disabled = true;
                    emailSubmit.textContent = "Sending\u2026";

                    pendingAction = "submit";
                    bridge.send("changeEmail", {
                        email: email,
                        callbackURL: "/account/add-email"
                    });
                }

                // Bridge listener for changeEmail results (handles both submit and resend)
                bridge.on("changeEmailResult", function (data) {
                    if (pendingAction === "submit") {
                        if (data.error) {
                            emailError.textContent = data.error;
                            emailSubmit.disabled = false;
                            emailSubmit.textContent = "Send verification code";
                        } else {
                            document.getElementById("otp-email-display").textContent = currentEmail;
                            clearOtpInputs();
                            showStep("otp");
                            setTimeout(function () {
                                var first = otpInputs[0];
                                if (first) first.focus();
                            }, 250);
                            emailSubmit.disabled = false;
                            emailSubmit.textContent = "Send verification code";
                        }
                    } else if (pendingAction === "resend") {
                        if (data.error) {
                            otpError.textContent = data.error;
                            otpResend.textContent = "Resend";
                        } else {
                            otpResend.textContent = "Sent!";
                            clearOtpInputs();
                            setTimeout(function () {
                                otpInputs[0].focus();
                            }, 100);
                        }
                        // 30-second cooldown
                        var seconds = 30;
                        var timer = setInterval(function () {
                            seconds--;
                            if (seconds > 0) {
                                otpResend.textContent = "Resend (" + seconds + "s)";
                            } else {
                                clearInterval(timer);
                                resendCooldown = false;
                                otpResend.classList.remove("disabled");
                                otpResend.textContent = "Resend";
                            }
                        }, 1000);
                    }
                });

                // --------------------------------------------------------
                // OTP step
                // --------------------------------------------------------

                var otpContainer = document.getElementById("otp-inputs");
                var otpInputs = otpContainer.querySelectorAll("input");
                var otpVerify = document.getElementById("otp-verify");
                var otpError = document.getElementById("otp-error");
                var otpResend = document.getElementById("otp-resend");

                function getOtpValue() {
                    var code = "";
                    for (var i = 0; i < otpInputs.length; i++) {
                        code += otpInputs[i].value;
                    }
                    return code;
                }

                function clearOtpInputs() {
                    for (var i = 0; i < otpInputs.length; i++) {
                        otpInputs[i].value = "";
                        otpInputs[i].classList.remove("otp-error");
                    }
                    otpError.textContent = "";
                    otpVerify.disabled = true;
                }

                function checkOtpComplete() {
                    otpVerify.disabled = getOtpValue().length !== 6;
                }

                // Wire up OTP input behavior: auto-advance, backspace, paste.
                for (var i = 0; i < otpInputs.length; i++) {
                    (function (idx) {
                        var inp = otpInputs[idx];

                        inp.addEventListener("input", function () {
                            var val = inp.value.replace(/[^0-9]/g, "");
                            inp.value = val.charAt(0) || "";
                            inp.classList.remove("otp-error");
                            otpError.textContent = "";

                            if (val && idx < otpInputs.length - 1) {
                                otpInputs[idx + 1].focus();
                            }
                            checkOtpComplete();
                        });

                        inp.addEventListener("keydown", function (e) {
                            if (e.key === "Backspace" && !inp.value && idx > 0) {
                                otpInputs[idx - 1].focus();
                                otpInputs[idx - 1].value = "";
                                checkOtpComplete();
                            }
                            if (e.key === "Enter" && getOtpValue().length === 6) {
                                e.preventDefault();
                                verifyOtp();
                            }
                        });

                        inp.addEventListener("paste", function (e) {
                            e.preventDefault();
                            var pasted = (e.clipboardData || window.clipboardData)
                                .getData("text")
                                .replace(/[^0-9]/g, "")
                                .slice(0, 6);
                            for (var j = 0; j < pasted.length && j < otpInputs.length; j++) {
                                otpInputs[j].value = pasted.charAt(j);
                            }
                            var focusIdx = Math.min(pasted.length, otpInputs.length - 1);
                            otpInputs[focusIdx].focus();
                            checkOtpComplete();
                        });

                        inp.addEventListener("focus", function () {
                            inp.select();
                        });
                    })(i);
                }

                otpVerify.addEventListener("click", function (e) {
                    e.preventDefault();
                    verifyOtp();
                });

                function verifyOtp() {
                    var code = getOtpValue();
                    if (code.length !== 6) return;

                    otpError.textContent = "";
                    otpVerify.disabled = true;
                    otpVerify.textContent = "Verifying\u2026";

                    bridge.send("verifyEmailOtp", {
                        email: currentEmail,
                        otp: code
                    });
                }

                // Bridge listener for verifyEmailOtp results
                bridge.on("verifyEmailOtpResult", function (data) {
                    if (data.error) {
                        otpError.textContent = data.error;
                        for (var j = 0; j < otpInputs.length; j++) {
                            otpInputs[j].classList.add("otp-error");
                        }
                    } else {
                        bridge.send("emailAdded", { email: currentEmail });
                        showStep("success");
                    }
                    otpVerify.disabled = false;
                    otpVerify.textContent = "Verify";
                    checkOtpComplete();
                });

                // Resend OTP
                otpResend.addEventListener("click", function (e) {
                    e.preventDefault();
                    if (resendCooldown) return;

                    resendCooldown = true;
                    otpResend.classList.add("disabled");
                    otpResend.textContent = "Sending\u2026";

                    pendingAction = "resend";
                    bridge.send("changeEmail", {
                        email: currentEmail,
                        callbackURL: "/account/add-email"
                    });
                });

                // --------------------------------------------------------
                // Success step
                // --------------------------------------------------------

                document.getElementById("success-done").addEventListener("click", function (e) {
                    e.preventDefault();
                    bridge.send("emailAddedComplete");
                });

                // --------------------------------------------------------
                // Focus email input on load
                // --------------------------------------------------------

                setTimeout(function () {
                    emailInput.focus();
                }, 100);
            })();
        </script>
    </body>
</html>
