<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Add Credit Card</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --color-bg: #eeeceb;
                --color-surface: #f9f9f9;
                --color-text: #292929;
                --color-muted: #7a7775;
                --color-light: #a8a4a1;
                --color-border: #ddd9d6;
                --color-border-light: #e8e5e3;
                --color-accent: #292929;
                --color-white: #ffffff;
                --color-green: #3a8a5c;
                --color-green-bg: #e9f3ed;
                --color-red: #b8383d;
                --color-red-bg: #f8e8e9;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
                font-size: 16px;
                line-height: 1.5;
                color: var(--color-text);
                background: var(--color-bg);
                -webkit-font-smoothing: antialiased;
                -webkit-user-select: none;
                user-select: none;
            }

            .container {
                display: flex;
                flex-direction: column;
                height: 100vh;
                max-width: 420px;
                margin: 0 auto;
                padding: 2.5rem 1.5rem 1.5rem;
            }

            .header {
                text-align: center;
                margin-bottom: 1.5rem;
            }

            .header h1 {
                font-size: 1.375rem;
                font-weight: 700;
                letter-spacing: -0.02em;
                margin: 0 0 0.375rem;
            }

            .header p {
                font-size: 0.875rem;
                color: var(--color-muted);
                margin: 0;
            }

            .content {
                flex: 1;
                display: flex;
                flex-direction: column;
            }

            .card-panel {
                background: var(--color-surface);
                border: 1px solid var(--color-border-light);
                border-radius: 16px;
                padding: 1.25rem;
                margin-bottom: 1rem;
            }

            /* Loading state */
            .loading-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 3rem 1rem;
                gap: 0.75rem;
            }

            .spinner {
                width: 24px;
                height: 24px;
                border: 2.5px solid var(--color-border);
                border-top-color: var(--color-accent);
                border-radius: 50%;
                animation: spin 0.7s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .loading-state p {
                font-size: 0.8125rem;
                color: var(--color-muted);
            }

            /* Error state */
            .error-state {
                text-align: center;
                padding: 2rem 1rem;
            }

            .error-state .error-icon {
                font-size: 2rem;
                margin-bottom: 0.75rem;
            }

            .error-state p {
                font-size: 0.875rem;
                color: var(--color-red);
                margin-bottom: 1rem;
            }

            /* Success state */
            .success-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 3rem 1rem;
                gap: 0.75rem;
            }

            .success-state .checkmark {
                width: 48px;
                height: 48px;
                background: var(--color-green-bg);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.5rem;
            }

            .success-state h2 {
                font-size: 1.125rem;
                font-weight: 600;
                margin: 0;
            }

            .success-state p {
                font-size: 0.875rem;
                color: var(--color-muted);
                margin: 0;
            }

            /* Stripe form */
            .stripe-form {
                display: none;
            }

            .stripe-form.active {
                display: block;
            }

            #stripe-payment-element {
                min-height: 120px;
            }

            .stripe-loading #stripe-payment-element {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .card-error {
                font-size: 0.8125rem;
                color: var(--color-red);
                margin-top: 0.75rem;
                min-height: 1.25rem;
            }

            /* Buttons */
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 0.75rem 1.5rem;
                font-size: 0.9375rem;
                font-weight: 600;
                border-radius: 12px;
                border: none;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    opacity 0.15s ease;
                font-family: inherit;
                width: 100%;
            }

            .btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .btn-primary {
                background: var(--color-accent);
                color: var(--color-white);
            }

            .btn-primary:hover:not(:disabled) {
                background: #3d3d3d;
            }

            .btn-secondary {
                background: transparent;
                color: var(--color-muted);
                border: 1px solid var(--color-border);
            }

            .btn-secondary:hover:not(:disabled) {
                background: var(--color-border-light);
            }

            .btn-group {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
                margin-top: 1rem;
            }

            .skip-link {
                display: block;
                text-align: center;
                margin-top: 1rem;
                font-size: 0.8125rem;
                color: var(--color-muted);
                text-decoration: none;
                cursor: pointer;
            }

            .skip-link:hover {
                text-decoration: underline;
            }

            .hidden {
                display: none !important;
            }

            /* Footer hint */
            .footer-hint {
                text-align: center;
                padding-top: 1rem;
                font-size: 0.75rem;
                color: var(--color-light);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>Subscribe</h1>
                <p>$75/month + model usage. Invite your whole team.</p>
            </div>

            <div class="content">
                <!-- Loading state -->
                <div id="loading-state" class="card-panel">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Setting up...</p>
                    </div>
                </div>

                <!-- Error state -->
                <div id="error-state" class="card-panel hidden">
                    <div class="error-state">
                        <div class="error-icon">⚠️</div>
                        <p id="error-message">Something went wrong.</p>
                        <button class="btn btn-secondary" onclick="handleRetry()">Try Again</button>
                    </div>
                </div>

                <!-- Success state -->
                <div id="success-state" class="card-panel hidden">
                    <div class="success-state">
                        <div class="checkmark">✓</div>
                        <h2>Card added</h2>
                        <p>You can now invite people to your FreeFlow.</p>
                    </div>
                </div>

                <!-- Stripe form -->
                <div id="stripe-form" class="card-panel stripe-form">
                    <div id="stripe-payment-element"></div>
                    <div id="card-error" class="card-error"></div>
                    <div class="btn-group">
                        <button id="btn-submit" class="btn btn-primary" onclick="handleSubmit()">Add card</button>
                    </div>
                    <a class="skip-link" onclick="handleSkip()">Skip for now</a>
                </div>
            </div>

            <div class="footer-hint">
                Your card will only be charged after your free trial ends.
                <br />
                <span style="font-size: 0.75rem; color: var(--color-muted)"
                    >Your card details are handled securely by Stripe.</span
                >
            </div>
        </div>

        <script>
            var stripe = null;
            var elements = null;
            var paymentElement = null;
            var isSubmitting = false;

            // Bridge communication
            function send(action, data) {
                var message = { action: action };
                if (data !== undefined && data !== null) {
                    message.data = data;
                }
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.billing) {
                    window.webkit.messageHandlers.billing.postMessage(message);
                } else {
                    console.log("[billing] send:", JSON.stringify(message));
                }
            }

            function showState(stateId) {
                var states = ["loading-state", "error-state", "success-state", "stripe-form"];
                for (var i = 0; i < states.length; i++) {
                    var el = document.getElementById(states[i]);
                    if (el) {
                        if (states[i] === stateId) {
                            el.classList.remove("hidden");
                            if (states[i] === "stripe-form") {
                                el.classList.add("active");
                            }
                        } else {
                            el.classList.add("hidden");
                            if (states[i] === "stripe-form") {
                                el.classList.remove("active");
                            }
                        }
                    }
                }
            }

            function initStripe(publishableKey, clientSecret) {
                stripe = Stripe(publishableKey);

                var appearance = {
                    theme: "stripe",
                    variables: {
                        fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif',
                        colorPrimary: "#292929",
                        colorBackground: "#ffffff",
                        colorText: "#292929",
                        colorDanger: "#b8383d",
                        borderRadius: "10px",
                        spacingUnit: "4px",
                        fontSizeBase: "15px",
                    },
                    rules: {
                        ".Input": {
                            border: "1px solid #ddd9d6",
                            boxShadow: "none",
                            padding: "12px 14px",
                        },
                        ".Input:focus": {
                            border: "1px solid #292929",
                            boxShadow: "0 0 0 2px rgba(41, 41, 41, 0.1)",
                        },
                        ".Label": {
                            fontSize: "13px",
                            fontWeight: "500",
                            color: "#7a7775",
                        },
                    },
                };

                elements = stripe.elements({
                    appearance: appearance,
                    clientSecret: clientSecret,
                });

                paymentElement = elements.create("payment", {
                    layout: "tabs",
                });

                paymentElement.mount("#stripe-payment-element");

                paymentElement.on("ready", function () {
                    showState("stripe-form");
                });

                paymentElement.on("loaderror", function (event) {
                    showError("Could not load payment form. Please try again.");
                });
            }

            function showError(message) {
                document.getElementById("error-message").textContent = message;
                showState("error-state");
            }

            function handleRetry() {
                showState("loading-state");
                send("ready");
            }

            function handleSkip() {
                send("skip");
            }

            function handleSubmit() {
                if (isSubmitting || !stripe || !elements) return;

                isSubmitting = true;
                var submitBtn = document.getElementById("btn-submit");
                var errorEl = document.getElementById("card-error");

                submitBtn.disabled = true;
                submitBtn.textContent = "Processing...";
                errorEl.textContent = "";

                stripe
                    .confirmSetup({
                        elements: elements,
                        redirect: "if_required",
                        confirmParams: {
                            return_url: "https://localhost/billing-complete",
                        },
                    })
                    .then(function (result) {
                        if (result.error) {
                            errorEl.textContent = result.error.message || "Could not process card.";
                            submitBtn.disabled = false;
                            submitBtn.textContent = "Add card";
                            isSubmitting = false;
                        } else {
                            var setupIntentId = result.setupIntent ? result.setupIntent.id : null;
                            if (setupIntentId) {
                                send("submitPayment", { setupIntentId: setupIntentId });
                            } else {
                                errorEl.textContent = "Could not verify card. Please try again.";
                                submitBtn.disabled = false;
                                submitBtn.textContent = "Add card";
                                isSubmitting = false;
                            }
                        }
                    })
                    .catch(function (err) {
                        errorEl.textContent = "An error occurred. Please try again.";
                        submitBtn.disabled = false;
                        submitBtn.textContent = "Add card";
                        isSubmitting = false;
                    });
            }

            // Bridge event handler
            window.billingBridge = {
                onEvent: function (data) {
                    if (!data || !data.event) return;

                    switch (data.event) {
                        case "loading":
                            showState("loading-state");
                            break;

                        case "stripeReady":
                            if (data.clientSecret && data.publishableKey) {
                                if (typeof Stripe === "undefined") {
                                    var script = document.createElement("script");
                                    script.src = "https://js.stripe.com/v3/";
                                    script.onload = function () {
                                        initStripe(data.publishableKey, data.clientSecret);
                                    };
                                    script.onerror = function () {
                                        showError("Could not load payment system. Please try again.");
                                    };
                                    document.head.appendChild(script);
                                } else {
                                    initStripe(data.publishableKey, data.clientSecret);
                                }
                            } else {
                                showError("Payment setup failed. Please try again.");
                            }
                            break;

                        case "error":
                            var errMsg = data.message || "Something went wrong.";
                            showError(errMsg);
                            break;

                        case "paymentSuccess":
                            showState("success-state");
                            break;

                        case "paymentError":
                            var payErr = data.message || "Could not save card.";
                            document.getElementById("card-error").textContent = payErr;
                            var btn = document.getElementById("btn-submit");
                            btn.disabled = false;
                            btn.textContent = "Add card";
                            isSubmitting = false;
                            break;

                        default:
                            break;
                    }
                },
            };

            // On page load, tell native we're ready
            document.addEventListener("DOMContentLoaded", function () {
                send("ready");
            });
        </script>
    </body>
</html>
